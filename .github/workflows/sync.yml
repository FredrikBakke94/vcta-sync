name: VCTA Sync

on:
  workflow_dispatch:         # triggered by cron-job.org every 30 minutes

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python sync.py
        env:
          VCTA_COOKIE: ${{ secrets.VCTA_COOKIE }}

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update team data"
          git push
