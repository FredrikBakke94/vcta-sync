name: VCTA Sync

on:
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python sync.py
        env:
          VCTA_COOKIE: ${{ secrets.VCTA_COOKIE }}
